<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tolton Seeq Engineering Notebook</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-green: #3fb950;
      --border: #30363d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }
    header {
      text-align: center;
      margin-bottom: 4rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: white;
    }
    .subtitle {
      font-size: 1.1rem;
      color: var(--text-muted);
    }
    h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: var(--accent);
    }
    .reports-list {
      list-style: none;
    }
    .reports-list li {
      margin-bottom: 1rem;
    }
    .report-link {
      display: block;
      padding: 1.25rem 1.5rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s;
    }
    .report-link:hover {
      border-color: var(--accent);
      background: #1c2128;
    }
    .report-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }
    .report-date {
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .report-desc {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      background: var(--bg-secondary);
      border-radius: 8px;
      border: 1px dashed var(--border);
    }
    footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Tolton Seeq Engineering Notebook</h1>
      <p class="subtitle">Technical reports, research, and experiments</p>
    </header>

    <main>
      <h2>Reports</h2>
      <ul class="reports-list">
        <!-- Add new reports here:
        <li>
          <a href="reports/example-report.html" class="report-link">
            <div class="report-title">Example Report Title</div>
            <div class="report-date">2025-12-11</div>
            <div class="report-desc">Brief description of what this report covers.</div>
          </a>
        </li>
        -->
      </ul>
      <div class="empty-state">
        No reports yet. Check back soon!
      </div>
    </main>

    <footer>
      <p>James Tolton · <a href="https://github.com/seeq12/tolton-seeq-engineering-notebook">GitHub</a></p>
    </footer>
  </div>
</body>
</html>
